<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | OTP Authentication</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="layout">
      <div class="shell">
        <header class="brand">
          <div class="brand-mark">A</div>
          <div>
            <strong>Afghan OTP Auth</strong>
            <span>Local GSM modem prototype</span>
          </div>
        </header>
        <section class="card">
          <h1>Welcome back</h1>
          <p class="subtitle">Enter your registered mobile number to receive a secure one-time login code.</p>
          <div id="message" class="message" role="alert" aria-live="polite"></div>
          <form id="login-form">
            <label class="field">
              <span>Afghanistan mobile number</span>
              <input name="phone" type="tel" autocomplete="tel" inputmode="tel" required placeholder="070 123 4567">
            </label>
            <button class="button" type="submit">Send OTP</button>
          </form>
          <p class="switch">New here? <a href="/signup.html">Create an account</a></p>
        </section>
      </div>
    </main>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
